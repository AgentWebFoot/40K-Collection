<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grid: Points / Circles + Erase Masks + Objectives + Measure</title>
<style>
  :root {
    --bg: #0f1220;
    --panel: #121528;
    --text: #e7e9ee;
    --canvas-bg: #b8b9b3;
    --grid: #acaca6;
    --grid-bold: #2d2c26;
    --green: #455a4f;
    --green-fill: rgba(69, 90, 79, 1);
    --red: #7c322a;
    --red-fill: rgba(124, 50, 42, 1);
    --objective: #144062;
    --measure: #1d1916;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 16px;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  }

  .wrap {
    width: min(95vw, 1100px);
    display: grid;
    gap: 12px;
  }

  .name-bar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--panel);
    border-radius: 10px;
  }

  .name-input {
    flex: 1 1 280px;
    min-width: 220px;
    padding: 10px 12px;
    border: 1px solid #2a2e4a;
    border-radius: 10px;
    background: #191e36;
    color: var(--text);
    font: inherit;
  }

  .name-input::placeholder {
    color: rgba(231, 233, 238, 0.55);
  }

  canvas {
    width: 100%;
    height: auto;
    background: var(--canvas-bg);
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    cursor: crosshair;
  }

  .toolbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    padding: 10px;
    background: var(--panel);
    border-radius: 10px;
  }

  .toolbar .sp {
    flex: 1;
  }

  .toolbar-group {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
  }

  .toolbar-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    opacity: 0.7;
  }

  .btn {
    padding: 8px 12px;
    border: 1px solid #2a2e4a;
    border-radius: 10px;
    background: #191e36;
    color: var(--text);
    cursor: pointer;
  }

  .btn[aria-pressed="true"] {
    outline: 2px solid #8aa0ff;
  }

  .btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

  .swatch {
    display: inline-block;
    width: 14px;
    height: 14px;
    margin-right: 8px;
    border-radius: 50%;
    vertical-align: -2px;
  }

  .swatch.green { background: var(--green); }
  .swatch.red { background: var(--red); }
  .swatch.objective { background: var(--objective); }
  .swatch.measure { background: var(--measure); }
  .swatch.erase {
    background: conic-gradient(from 45deg, #ff4d4d 0 25%, #222 0 50%, #33d17a 0 75%, #222 0);
  }

  .hint {
    opacity: 0.85;
  }

  .status-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    font-size: 14px;
  }

  .footer-bar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 12px;
    background: var(--panel);
    border-radius: 10px;
  }

  .footer-note {
    font-size: 13px;
    opacity: 0.8;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    min-height: 32px;
    padding: 6px 10px;
    border: 1px solid #2a2e4a;
    border-radius: 999px;
    background: rgba(25, 30, 54, 0.85);
  }

  .chip strong {
    margin-right: 6px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="name-bar">
    <span class="toolbar-label">Map Name</span>
    <input id="mapName" class="name-input" type="text" value="40k-map" placeholder="Enter map name" />
  </div>

  <canvas id="grid"></canvas>

  <div class="toolbar">
    <div class="toolbar-group">
      <span class="toolbar-label">Tool</span>
      <button id="pickGreen" class="btn" aria-pressed="true"><span class="swatch green"></span>Green Area</button>
      <button id="pickRed" class="btn" aria-pressed="false"><span class="swatch red"></span>Red Area</button>
      <button id="pickObjective" class="btn" aria-pressed="false"><span class="swatch objective"></span>Objective</button>
      <button id="pickErase" class="btn" aria-pressed="false"><span class="swatch erase"></span>Erase Area</button>
      <button id="pickMeasure" class="btn" aria-pressed="false"><span class="swatch measure"></span>Measure</button>
    </div>

    <span class="sp"></span>

    <div class="toolbar-group">
      <span class="toolbar-label">Shape</span>
      <button id="modePoints" class="btn" aria-pressed="true">Polygon</button>
      <button id="modeCircle" class="btn" aria-pressed="false">Circle</button>
      <button id="modeRectangle" class="btn" aria-pressed="false">Rectangle</button>
    </div>

    <span class="sp"></span>

    <div class="toolbar-group">
      <span class="toolbar-label">Draft</span>
      <button id="finishMask" class="btn" title="Finish current shape (Enter)">Finish Shape</button>
      <button id="cancelDraft" class="btn" title="Cancel current draft (Escape)">Cancel Draft</button>
    </div>

    <div class="toolbar-group">
      <span class="toolbar-label">Actions</span>
    <button id="toggleMeasureErase" class="btn" aria-pressed="false">Erase Measure</button>
    <button id="importMap" class="btn">Import Map</button>
    <button id="exportMap" class="btn">Export Map</button>
    <button id="saveImage" class="btn">Save Image</button>
    <button id="undo" class="btn">Undo (current)</button>
    <button id="clear" class="btn">Clear (current)</button>
    </div>
  </div>
  <input id="importMapInput" type="file" accept=".json,application/json" hidden />

  <div class="status-row">
    <span id="draftStatus" class="chip"><strong>Draft:</strong> Ready to start</span>
    <span id="status" class="hint"></span>
  </div>

  <div id="help" class="hint"></div>

  <div class="footer-bar">
    <div class="toolbar-group">
      <span class="toolbar-label">Board Size</span>
      <button id="board44x30" class="btn" aria-pressed="false">44&quot; x 30&quot;</button>
      <button id="board44x60" class="btn" aria-pressed="true">44&quot; x 60&quot;</button>
      <button id="board44x90" class="btn" aria-pressed="false">44&quot; x 90&quot;</button>
    </div>
    <div id="boardSizeNote" class="footer-note">Board uses a 1&quot; grid and resizes the map to match the selected play area.</div>
  </div>
</div>

<script>
  const CELL = 30;
  const MARGIN = 18;
  const BOARD_PRESETS = {
    '44x30': { rows: 30, cols: 44, label: '44" x 30"' },
    '44x60': { rows: 44, cols: 60, label: '44" x 60"' },
    '44x90': { rows: 44, cols: 90, label: '44" x 90"' }
  };

  const TOOL_IDS = ['green', 'red', 'objective', 'erase', 'measure'];
  const MODE_IDS = ['points', 'circle', 'rectangle'];
  const BOARD_IDS = ['44x30', '44x60', '44x90'];

  const COLORS = {
    green: {
      stroke: css('--green', '#33d17a'),
      fill: css('--green-fill', 'rgba(51, 209, 122, 0.18)')
    },
    red: {
      stroke: css('--red', '#ff4d4d'),
      fill: css('--red-fill', 'rgba(255, 77, 77, 0.18)')
    }
  };

  const GRID_COLOR = css('--grid', '#3b3f55');
  const GRID_BOLD = css('--grid-bold', '#60657d');
  const OBJECTIVE_COLOR = css('--objective', '#197a4b');
  const MEASURE_COLOR = css('--measure', '#ffd36b');

  const canvas = document.getElementById('grid');
  const ctx = canvas.getContext('2d');
  const statusEl = document.getElementById('status');
  const draftStatusEl = document.getElementById('draftStatus');
  const helpEl = document.getElementById('help');
  const mapNameInput = document.getElementById('mapName');

  const off = document.createElement('canvas');
  const offCtx = off.getContext('2d');
  const layer = document.createElement('canvas');
  const layerCtx = layer.getContext('2d');
  const outline = document.createElement('canvas');
  const outlineCtx = outline.getContext('2d');
  const greenMask = document.createElement('canvas');
  const greenMaskCtx = greenMask.getContext('2d');
  const redMask = document.createElement('canvas');
  const redMaskCtx = redMask.getContext('2d');

  const toolButtons = {
    green: document.getElementById('pickGreen'),
    red: document.getElementById('pickRed'),
    objective: document.getElementById('pickObjective'),
    erase: document.getElementById('pickErase'),
    measure: document.getElementById('pickMeasure')
  };

  const modeButtons = {
    points: document.getElementById('modePoints'),
    circle: document.getElementById('modeCircle'),
    rectangle: document.getElementById('modeRectangle')
  };

  const finishMaskBtn = document.getElementById('finishMask');
  const cancelDraftBtn = document.getElementById('cancelDraft');
  const toggleMeasureEraseBtn = document.getElementById('toggleMeasureErase');
  const importMapBtn = document.getElementById('importMap');
  const exportMapBtn = document.getElementById('exportMap');
  const saveImageBtn = document.getElementById('saveImage');
  const importMapInput = document.getElementById('importMapInput');
  const undoBtn = document.getElementById('undo');
  const clearBtn = document.getElementById('clear');
  const boardSizeNoteEl = document.getElementById('boardSizeNote');
  const boardButtons = {
    '44x30': document.getElementById('board44x30'),
    '44x60': document.getElementById('board44x60'),
    '44x90': document.getElementById('board44x90')
  };

  let currentTool = 'green';
  let currentMode = 'points';
  let currentBoardPreset = '44x60';
  let measureMode = 'add';
  let hoverSnap = null;

  const state = {
    green: { polygons: [], circles: [], rectangles: [] },
    red: { polygons: [], circles: [], rectangles: [] }
  };
  const areaOps = [];

  const objectives = { arr: [], set: new Set() };
  const measurements = [];

  let pendingCircle = null;
  let pendingAreaPoly = null;
  let pendingRectangle = null;
  let pendingMaskCircle = null;
  let pendingMaskPoly = null;
  let pendingMaskRectangle = null;
  let previewPolySnap = null;
  let pendingMeasure = null;

  function css(name, fallback) {
    const value = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    return value || fallback;
  }

  function key(r, c) {
    return `${r},${c}`;
  }

  function getMapName() {
    const name = mapNameInput.value.trim();
    return name || '40k-map';
  }

  function sanitizeFilename(name) {
    return name
      .replace(/[<>:"/\\|?*\u0000-\u001F]/g, '')
      .replace(/\s+/g, ' ')
      .trim() || '40k-map';
  }

  function getBoardConfig() {
    return BOARD_PRESETS[currentBoardPreset];
  }

  function getRows() {
    return getBoardConfig().rows;
  }

  function getCols() {
    return getBoardConfig().cols;
  }

  function getLogicalWidth() {
    return getCols() * CELL + 2 * MARGIN;
  }

  function getLogicalHeight() {
    return getRows() * CELL + 2 * MARGIN;
  }

  function toXY(r, c) {
    return {
      x: MARGIN + c * CELL,
      y: MARGIN + r * CELL
    };
  }

  function normalizeRect(rect) {
    return {
      r1: Math.min(rect.start.r, rect.end.r),
      c1: Math.min(rect.start.c, rect.end.c),
      r2: Math.max(rect.start.r, rect.end.r),
      c2: Math.max(rect.start.c, rect.end.c)
    };
  }

  function rectHasArea(rect) {
    return Boolean(rect && (rect.start.r !== rect.end.r || rect.start.c !== rect.end.c));
  }

  function drawRectPath(targetCtx, rect) {
    const normalized = normalizeRect(rect);
    const topLeft = toXY(normalized.r1, normalized.c1);
    const bottomRight = toXY(normalized.r2, normalized.c2);
    targetCtx.beginPath();
    targetCtx.rect(topLeft.x, topLeft.y, bottomRight.x - topLeft.x, bottomRight.y - topLeft.y);
  }

  function toCanvasPoint(point) {
    return toXY(point.r, point.c);
  }

  function clonePolygon(points) {
    return points.map(point => ({ r: point.r, c: point.c }));
  }

  function cloneCircle(circle) {
    return { r: circle.r, c: circle.c, radiusPx: circle.radiusPx };
  }

  function cloneRectangle(rect) {
    return { r1: rect.r1, c1: rect.c1, r2: rect.r2, c2: rect.c2 };
  }

  function cloneAreaOp(op) {
    if (!op || (op.kind !== 'add' && op.kind !== 'erase')) {
      return null;
    }

    if (!['points', 'circle', 'rectangle'].includes(op.shapeType)) {
      return null;
    }

    let data = null;
    if (op.shapeType === 'points') {
      data = clonePoints(op.data);
      if (data.length < 3) return null;
    } else if (op.shapeType === 'circle') {
      data = cloneCircle(op.data);
      if (!Number.isFinite(data.radiusPx) || data.radiusPx <= 0) return null;
    } else {
      data = cloneRectangle(op.data);
    }

    if (op.kind === 'add') {
      if (!['green', 'red'].includes(op.color)) {
        return null;
      }
      return { kind: 'add', color: op.color, shapeType: op.shapeType, data };
    }

    return { kind: 'erase', shapeType: op.shapeType, data };
  }

  function getRectangleCorners(rect) {
    return [
      { r: rect.r1, c: rect.c1 },
      { r: rect.r1, c: rect.c2 },
      { r: rect.r2, c: rect.c2 },
      { r: rect.r2, c: rect.c1 }
    ];
  }

  function pointInCircle(point, circle) {
    const center = toXY(circle.r, circle.c);
    return Math.hypot(point.x - center.x, point.y - center.y) <= circle.radiusPx;
  }

  function pointInRect(point, rect) {
    const topLeft = toXY(rect.r1, rect.c1);
    const bottomRight = toXY(rect.r2, rect.c2);
    return (
      point.x >= topLeft.x &&
      point.x <= bottomRight.x &&
      point.y >= topLeft.y &&
      point.y <= bottomRight.y
    );
  }

  function pointInPolygon(point, polygon) {
    const points = polygon.map(toCanvasPoint);
    let inside = false;

    for (let i = 0, j = points.length - 1; i < points.length; j = i++) {
      const xi = points[i].x;
      const yi = points[i].y;
      const xj = points[j].x;
      const yj = points[j].y;

      const intersects =
        ((yi > point.y) !== (yj > point.y)) &&
        point.x < ((xj - xi) * (point.y - yi)) / ((yj - yi) || Number.EPSILON) + xi;

      if (intersects) {
        inside = !inside;
      }
    }

    return inside;
  }

  function segmentsIntersect(a, b, c, d) {
    const orientation = (p, q, r) => {
      const value = (q.y - p.y) * (r.x - q.x) - (q.x - p.x) * (r.y - q.y);
      if (Math.abs(value) < 0.001) return 0;
      return value > 0 ? 1 : 2;
    };

    const onSegment = (p, q, r) =>
      q.x <= Math.max(p.x, r.x) + 0.001 &&
      q.x + 0.001 >= Math.min(p.x, r.x) &&
      q.y <= Math.max(p.y, r.y) + 0.001 &&
      q.y + 0.001 >= Math.min(p.y, r.y);

    const o1 = orientation(a, b, c);
    const o2 = orientation(a, b, d);
    const o3 = orientation(c, d, a);
    const o4 = orientation(c, d, b);

    if (o1 !== o2 && o3 !== o4) {
      return true;
    }

    if (o1 === 0 && onSegment(a, c, b)) return true;
    if (o2 === 0 && onSegment(a, d, b)) return true;
    if (o3 === 0 && onSegment(c, a, d)) return true;
    if (o4 === 0 && onSegment(c, b, d)) return true;
    return false;
  }

  function getPolygonEdges(polygon) {
    const points = polygon.map(toCanvasPoint);
    const edges = [];

    for (let i = 0; i < points.length; i++) {
      edges.push([points[i], points[(i + 1) % points.length]]);
    }

    return edges;
  }

  function getRectEdges(rect) {
    const corners = getRectangleCorners(rect).map(toCanvasPoint);
    return [
      [corners[0], corners[1]],
      [corners[1], corners[2]],
      [corners[2], corners[3]],
      [corners[3], corners[0]]
    ];
  }

  function segmentIntersectsCircle(a, b, circle) {
    const center = toXY(circle.r, circle.c);
    return distanceToSegment(center.x, center.y, a.x, a.y, b.x, b.y) <= circle.radiusPx;
  }

  function polygonsIntersect(a, b) {
    for (const point of a) {
      if (pointInPolygon(toCanvasPoint(point), b)) {
        return true;
      }
    }

    for (const point of b) {
      if (pointInPolygon(toCanvasPoint(point), a)) {
        return true;
      }
    }

    const aEdges = getPolygonEdges(a);
    const bEdges = getPolygonEdges(b);
    for (const [a1, a2] of aEdges) {
      for (const [b1, b2] of bEdges) {
        if (segmentsIntersect(a1, a2, b1, b2)) {
          return true;
        }
      }
    }

    return false;
  }

  function polygonIntersectsCircle(polygon, circle) {
    const center = toXY(circle.r, circle.c);

    if (pointInPolygon(center, polygon)) {
      return true;
    }

    for (const point of polygon) {
      if (pointInCircle(toCanvasPoint(point), circle)) {
        return true;
      }
    }

    for (const [a, b] of getPolygonEdges(polygon)) {
      if (segmentIntersectsCircle(a, b, circle)) {
        return true;
      }
    }

    return false;
  }

  function polygonIntersectsRect(polygon, rect) {
    const rectPoints = getRectangleCorners(rect);

    for (const point of polygon) {
      if (pointInRect(toCanvasPoint(point), rect)) {
        return true;
      }
    }

    for (const point of rectPoints) {
      if (pointInPolygon(toCanvasPoint(point), polygon)) {
        return true;
      }
    }

    const polygonEdges = getPolygonEdges(polygon);
    const rectEdges = getRectEdges(rect);
    for (const [a1, a2] of polygonEdges) {
      for (const [b1, b2] of rectEdges) {
        if (segmentsIntersect(a1, a2, b1, b2)) {
          return true;
        }
      }
    }

    return false;
  }

  function circlesIntersect(a, b) {
    const centerA = toXY(a.r, a.c);
    const centerB = toXY(b.r, b.c);
    return Math.hypot(centerA.x - centerB.x, centerA.y - centerB.y) <= a.radiusPx + b.radiusPx;
  }

  function rectsIntersect(a, b) {
    return !(a.c2 < b.c1 || a.c1 > b.c2 || a.r2 < b.r1 || a.r1 > b.r2);
  }

  function rectIntersectsCircle(rect, circle) {
    const topLeft = toXY(rect.r1, rect.c1);
    const bottomRight = toXY(rect.r2, rect.c2);
    const center = toXY(circle.r, circle.c);
    const closestX = Math.max(topLeft.x, Math.min(center.x, bottomRight.x));
    const closestY = Math.max(topLeft.y, Math.min(center.y, bottomRight.y));
    return Math.hypot(center.x - closestX, center.y - closestY) <= circle.radiusPx;
  }

  function logicalFromClient(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const logicalWidth = getLogicalWidth();
    const logicalHeight = getLogicalHeight();
    return {
      x: (clientX - rect.left) * (logicalWidth / rect.width),
      y: (clientY - rect.top) * (logicalHeight / rect.height)
    };
  }

  function snapToGrid(x, y) {
    const rows = getRows();
    const cols = getCols();
    const clampedX = Math.max(MARGIN, Math.min(MARGIN + cols * CELL, x));
    const clampedY = Math.max(MARGIN, Math.min(MARGIN + rows * CELL, y));
    const c = Math.round((clampedX - MARGIN) / CELL);
    const r = Math.round((clampedY - MARGIN) / CELL);

    return {
      r: Math.max(0, Math.min(rows, r)),
      c: Math.max(0, Math.min(cols, c))
    };
  }

  function drawPath(targetCtx, points, shouldClose = true) {
    if (!points.length) {
      return;
    }

    const start = toXY(points[0].r, points[0].c);
    targetCtx.beginPath();
    targetCtx.moveTo(start.x, start.y);

    for (let i = 1; i < points.length; i++) {
      const point = toXY(points[i].r, points[i].c);
      targetCtx.lineTo(point.x, point.y);
    }

    if (shouldClose) {
      targetCtx.closePath();
    }
  }

  function distanceToSegment(px, py, ax, ay, bx, by) {
    const abx = bx - ax;
    const aby = by - ay;
    const abLenSq = abx * abx + aby * aby;
    if (abLenSq === 0) {
      return Math.hypot(px - ax, py - ay);
    }

    const t = Math.max(0, Math.min(1, ((px - ax) * abx + (py - ay) * aby) / abLenSq));
    const closestX = ax + abx * t;
    const closestY = ay + aby * t;
    return Math.hypot(px - closestX, py - closestY);
  }

  function setPressedState(buttons, selectedValue) {
    for (const [value, button] of Object.entries(buttons)) {
      button.setAttribute('aria-pressed', String(value === selectedValue));
    }
  }

  function resetMaskDraft() {
    pendingMaskCircle = null;
    pendingMaskPoly = null;
    pendingAreaPoly = null;
    pendingRectangle = null;
    pendingMaskRectangle = null;
    previewPolySnap = null;
  }

  function resetPendingState() {
    pendingCircle = null;
    resetMaskDraft();
    pendingMeasure = null;
  }

  function clonePoints(points) {
    return Array.isArray(points)
      ? points
          .filter(point => point && Number.isFinite(point.r) && Number.isFinite(point.c))
          .map(point => ({ r: point.r, c: point.c }))
      : [];
  }

  function clonePolygonList(polygons) {
    return Array.isArray(polygons)
      ? polygons.map(points => clonePoints(points)).filter(points => points.length >= 3)
      : [];
  }

  function cloneRectangles(rectangles) {
    return Array.isArray(rectangles)
      ? rectangles
          .filter(rect =>
            rect &&
            Number.isFinite(rect.r1) &&
            Number.isFinite(rect.c1) &&
            Number.isFinite(rect.r2) &&
            Number.isFinite(rect.c2)
          )
          .map(rect => ({ r1: rect.r1, c1: rect.c1, r2: rect.r2, c2: rect.c2 }))
      : [];
  }

  function cloneCircles(circles) {
    return Array.isArray(circles)
      ? circles
          .filter(circle =>
            circle &&
            Number.isFinite(circle.r) &&
            Number.isFinite(circle.c) &&
            Number.isFinite(circle.radiusPx)
          )
          .map(circle => ({ r: circle.r, c: circle.c, radiusPx: circle.radiusPx }))
      : [];
  }

  function cloneMeasurements(items) {
    return Array.isArray(items)
      ? items
          .filter(item =>
            item &&
            item.a &&
            item.b &&
            Number.isFinite(item.a.r) &&
            Number.isFinite(item.a.c) &&
            Number.isFinite(item.b.r) &&
            Number.isFinite(item.b.c)
          )
          .map(item => ({
            a: { r: item.a.r, c: item.a.c },
            b: { r: item.b.r, c: item.b.c }
          }))
      : [];
  }

  function rebuildStateFromOps() {
    state.green.polygons.length = 0;
    state.green.circles.length = 0;
    state.green.rectangles.length = 0;
    state.red.polygons.length = 0;
    state.red.circles.length = 0;
    state.red.rectangles.length = 0;

    for (const op of areaOps) {
      if (op.kind !== 'add') {
        continue;
      }

      if (op.shapeType === 'points') {
        state[op.color].polygons.push(clonePolygon(op.data));
      } else if (op.shapeType === 'circle') {
        state[op.color].circles.push(cloneCircle(op.data));
      } else if (op.shapeType === 'rectangle') {
        state[op.color].rectangles.push(cloneRectangle(op.data));
      }
    }
  }

  function addAreaOp(op) {
    const cloned = cloneAreaOp(op);
    if (!cloned) {
      return;
    }

    areaOps.push(cloned);
    rebuildStateFromOps();
  }

  function clearAreaOps(filterFn) {
    for (let i = areaOps.length - 1; i >= 0; i--) {
      if (filterFn(areaOps[i])) {
        areaOps.splice(i, 1);
      }
    }

    rebuildStateFromOps();
  }

  function undoAreaOp(filterFn) {
    for (let i = areaOps.length - 1; i >= 0; i--) {
      if (filterFn(areaOps[i])) {
        areaOps.splice(i, 1);
        rebuildStateFromOps();
        return true;
      }
    }

    return false;
  }

  function getShapeTypeForMode(mode) {
    if (mode === 'circle') return 'circle';
    if (mode === 'rectangle') return 'rectangle';
    return 'points';
  }

  function drawStoredShapePath(targetCtx, shapeType, data) {
    if (shapeType === 'points') {
      drawPath(targetCtx, data);
      return;
    }

    if (shapeType === 'circle') {
      const center = toXY(data.r, data.c);
      targetCtx.beginPath();
      targetCtx.arc(center.x, center.y, data.radiusPx, 0, Math.PI * 2);
      return;
    }

    drawRectPath(targetCtx, { start: { r: data.r1, c: data.c1 }, end: { r: data.r2, c: data.c2 } });
  }

  function clearLogicalContext(targetCtx, canvasEl) {
    targetCtx.save();
    targetCtx.setTransform(1, 0, 0, 1, 0, 0);
    targetCtx.clearRect(0, 0, canvasEl.width, canvasEl.height);
    targetCtx.restore();
  }

  function replayAreaOpsToMask(targetCtx, color) {
    clearLogicalContext(targetCtx, targetCtx.canvas);

    for (const op of areaOps) {
      if (op.kind === 'add' && op.color !== color) {
        continue;
      }

      targetCtx.save();
      targetCtx.globalCompositeOperation = op.kind === 'erase' ? 'destination-out' : 'source-over';
      targetCtx.fillStyle = '#fff';
      drawStoredShapePath(targetCtx, op.shapeType, op.data);
      targetCtx.fill();
      targetCtx.restore();
    }
  }

  function compositeMaskToLayer(maskCanvas, color) {
    const logicalWidth = getLogicalWidth();
    const logicalHeight = getLogicalHeight();
    const xOffset = logicalWidth / outline.width;
    const yOffset = logicalHeight / outline.height;

    clearLogicalContext(outlineCtx, outline);
    outlineCtx.save();
    for (let dx = -1; dx <= 1; dx++) {
      for (let dy = -1; dy <= 1; dy++) {
        if (dx === 0 && dy === 0) {
          continue;
        }

        outlineCtx.drawImage(
          maskCanvas,
          dx * xOffset,
          dy * yOffset,
          logicalWidth,
          logicalHeight
        );
      }
    }
    outlineCtx.globalCompositeOperation = 'source-in';
    outlineCtx.fillStyle = COLORS[color].stroke;
    outlineCtx.fillRect(0, 0, logicalWidth, logicalHeight);
    outlineCtx.globalCompositeOperation = 'destination-out';
    outlineCtx.drawImage(maskCanvas, 0, 0, logicalWidth, logicalHeight);
    outlineCtx.restore();

    clearLogicalContext(layerCtx, layer);
    layerCtx.save();
    layerCtx.fillStyle = COLORS[color].fill;
    layerCtx.fillRect(0, 0, logicalWidth, logicalHeight);
    layerCtx.globalCompositeOperation = 'destination-in';
    layerCtx.drawImage(maskCanvas, 0, 0, logicalWidth, logicalHeight);
    layerCtx.restore();

    offCtx.drawImage(outline, 0, 0, logicalWidth, logicalHeight);
    offCtx.drawImage(layer, 0, 0, logicalWidth, logicalHeight);
  }

  function loadLegacyAreaOps(data) {
    areaOps.length = 0;
    rebuildStateFromOps();

    const pushLegacyAdds = (color, shapeType, shapes) => {
      for (const shape of shapes) {
        addAreaOp({ kind: 'add', color, shapeType, data: shape });
      }
    };

    const legacyGreenPolygons = clonePolygonList(data?.green?.polygons);
    pushLegacyAdds('green', 'points', legacyGreenPolygons);
    if (!legacyGreenPolygons.length && Array.isArray(data?.green?.points)) {
      const legacyGreen = clonePoints(data.green.points);
      if (legacyGreen.length >= 3) addAreaOp({ kind: 'add', color: 'green', shapeType: 'points', data: legacyGreen });
    }

    const legacyRedPolygons = clonePolygonList(data?.red?.polygons);
    pushLegacyAdds('red', 'points', legacyRedPolygons);
    if (!legacyRedPolygons.length && Array.isArray(data?.red?.points)) {
      const legacyRed = clonePoints(data.red.points);
      if (legacyRed.length >= 3) addAreaOp({ kind: 'add', color: 'red', shapeType: 'points', data: legacyRed });
    }

    pushLegacyAdds('green', 'circle', cloneCircles(data?.green?.circles));
    pushLegacyAdds('red', 'circle', cloneCircles(data?.red?.circles));
    pushLegacyAdds('green', 'rectangle', cloneRectangles(data?.green?.rectangles));
    pushLegacyAdds('red', 'rectangle', cloneRectangles(data?.red?.rectangles));

    for (const polygon of clonePolygonList(data?.masks?.polygons)) {
      addAreaOp({ kind: 'erase', shapeType: 'points', data: polygon });
    }

    for (const circle of cloneCircles(data?.masks?.circles)) {
      addAreaOp({ kind: 'erase', shapeType: 'circle', data: circle });
    }

    for (const rect of cloneRectangles(data?.masks?.rectangles)) {
      addAreaOp({ kind: 'erase', shapeType: 'rectangle', data: rect });
    }
  }

  function countAreaOps(kind, color, shapeType) {
    return areaOps.filter(op =>
      op.kind === kind &&
      (color ? op.color === color : true) &&
      op.shapeType === shapeType
    ).length;
  }

  function getSerializedMap() {
    return {
      version: 3,
      name: getMapName(),
      board: { ...getBoardConfig(), preset: currentBoardPreset },
      operations: areaOps.map(cloneAreaOp).filter(Boolean),
      green: {
        polygons: state.green.polygons.map(points => points.slice()),
        circles: state.green.circles.slice(),
        rectangles: state.green.rectangles.slice()
      },
      red: {
        polygons: state.red.polygons.map(points => points.slice()),
        circles: state.red.circles.slice(),
        rectangles: state.red.rectangles.slice()
      },
      masks: {
        polygons: [],
        circles: [],
        rectangles: []
      },
      objectives: objectives.arr.slice(),
      measurements: measurements.slice()
    };
  }

  function loadMapData(data) {
    if (data && typeof data.name === 'string' && data.name.trim()) {
      mapNameInput.value = data.name.trim();
    }

    const boardPreset =
      data &&
      data.board &&
      typeof data.board.preset === 'string' &&
      BOARD_PRESETS[data.board.preset]
        ? data.board.preset
        : currentBoardPreset;

    currentBoardPreset = boardPreset;
    setPressedState(boardButtons, boardPreset);

    areaOps.length = 0;
    if (Array.isArray(data?.operations)) {
      for (const op of data.operations) {
        const cloned = cloneAreaOp(op);
        if (cloned) {
          areaOps.push(cloned);
        }
      }
      rebuildStateFromOps();
    } else {
      loadLegacyAreaOps(data);
    }

    objectives.arr = clonePoints(data?.objectives);
    objectives.set = new Set(objectives.arr.map(point => key(point.r, point.c)));

    measurements.length = 0;
    measurements.push(...cloneMeasurements(data?.measurements));

    resetPendingState();
    measureMode = 'add';
    boardSizeNoteEl.textContent = `Board uses a 1" grid and is currently set to ${getBoardConfig().label}.`;
    resizeCanvas();
    updateHelp();
    draw();
  }

  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const logicalWidth = getLogicalWidth();
    const logicalHeight = getLogicalHeight();
    canvas.style.aspectRatio = `${logicalWidth} / ${logicalHeight}`;

    const cssWidth = canvas.clientWidth || logicalWidth;
    const cssScale = cssWidth / logicalWidth;
    const cssHeight = logicalHeight * cssScale;

    canvas.style.width = `${cssWidth}px`;
    canvas.style.height = `${cssHeight}px`;
    canvas.width = Math.round(cssWidth * dpr);
    canvas.height = Math.round(cssHeight * dpr);

    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(canvas.width / logicalWidth, canvas.height / logicalHeight);

    off.width = Math.round(cssWidth * dpr);
    off.height = Math.round(cssHeight * dpr);
    offCtx.setTransform(1, 0, 0, 1, 0, 0);
    offCtx.scale(off.width / logicalWidth, off.height / logicalHeight);

    layer.width = Math.round(cssWidth * dpr);
    layer.height = Math.round(cssHeight * dpr);
    layerCtx.setTransform(1, 0, 0, 1, 0, 0);
    layerCtx.scale(layer.width / logicalWidth, layer.height / logicalHeight);

    outline.width = Math.round(cssWidth * dpr);
    outline.height = Math.round(cssHeight * dpr);
    outlineCtx.setTransform(1, 0, 0, 1, 0, 0);
    outlineCtx.scale(outline.width / logicalWidth, outline.height / logicalHeight);

    greenMask.width = Math.round(cssWidth * dpr);
    greenMask.height = Math.round(cssHeight * dpr);
    greenMaskCtx.setTransform(1, 0, 0, 1, 0, 0);
    greenMaskCtx.scale(greenMask.width / logicalWidth, greenMask.height / logicalHeight);

    redMask.width = Math.round(cssWidth * dpr);
    redMask.height = Math.round(cssHeight * dpr);
    redMaskCtx.setTransform(1, 0, 0, 1, 0, 0);
    redMaskCtx.scale(redMask.width / logicalWidth, redMask.height / logicalHeight);
  }

  function addPolygon(color, points) {
    if (points.length < 3) {
      return;
    }

    addAreaOp({ kind: 'add', color, shapeType: 'points', data: points.slice() });
  }

  function startAreaPoly(tool, r, c) {
    pendingAreaPoly = {
      tool,
      pts: [{ r, c }]
    };
    previewPolySnap = null;
  }

  function addAreaPolyPoint(r, c) {
    if (!pendingAreaPoly) {
      return;
    }

    pendingAreaPoly.pts.push({ r, c });
  }

  function finishAreaPoly() {
    if (!pendingAreaPoly || pendingAreaPoly.pts.length < 3) {
      return;
    }

    addPolygon(pendingAreaPoly.tool, pendingAreaPoly.pts);
    pendingAreaPoly = null;
    previewPolySnap = null;
    draw();
  }

  function cancelAreaPoly() {
    pendingAreaPoly = null;
    previewPolySnap = null;
  }

  function startCircle(tool, r, c) {
    pendingCircle = {
      tool,
      center: { r, c },
      centerXY: toXY(r, c),
      radiusPx: 0
    };
  }

  function updateCircleRadius(target, clientX, clientY) {
    if (!target) {
      return;
    }

    const { x, y } = logicalFromClient(clientX, clientY);
    const snapped = snapToGrid(x, y);
    const point = toXY(snapped.r, snapped.c);
    target.radiusPx = Math.max(
      0,
      Math.hypot(point.x - target.centerXY.x, point.y - target.centerXY.y)
    );
  }

  function commitCircle() {
    if (!pendingCircle) {
      return;
    }

    const { tool, center, radiusPx } = pendingCircle;
    if (radiusPx > 0) {
      addAreaOp({ kind: 'add', color: tool, shapeType: 'circle', data: { r: center.r, c: center.c, radiusPx } });
    }

    pendingCircle = null;
    draw();
  }

  function startRectangle(tool, r, c) {
    pendingRectangle = {
      tool,
      start: { r, c },
      end: { r, c }
    };
  }

  function updateRectangle(rect, r, c) {
    if (!rect) {
      return;
    }

    rect.end = { r, c };
  }

  function commitRectangle() {
    if (!pendingRectangle || !rectHasArea(pendingRectangle)) {
      return;
    }

    addAreaOp({ kind: 'add', color: pendingRectangle.tool, shapeType: 'rectangle', data: normalizeRect(pendingRectangle) });
    pendingRectangle = null;
    draw();
  }

  function toggleObjective(r, c) {
    const objectiveKey = key(r, c);

    if (objectives.set.has(objectiveKey)) {
      objectives.set.delete(objectiveKey);
      const index = objectives.arr.findIndex(point => point.r === r && point.c === c);
      if (index >= 0) {
        objectives.arr.splice(index, 1);
      }
      return;
    }

    objectives.set.add(objectiveKey);
    objectives.arr.push({ r, c });
  }

  function addMeasurement(a, b) {
    measurements.push({ a, b });
  }

  function distInches(a, b) {
    return Math.hypot(b.c - a.c, b.r - a.r);
  }

  function startMaskCircle(r, c) {
    pendingMaskCircle = {
      center: { r, c },
      centerXY: toXY(r, c),
      radiusPx: 0
    };
  }

  function commitMaskCircle() {
    if (!pendingMaskCircle) {
      return;
    }

    const { center, radiusPx } = pendingMaskCircle;
    if (radiusPx > 0) {
      addAreaOp({ kind: 'erase', shapeType: 'circle', data: { r: center.r, c: center.c, radiusPx } });
    }

    pendingMaskCircle = null;
    draw();
  }

  function startMaskRectangle(r, c) {
    pendingMaskRectangle = {
      start: { r, c },
      end: { r, c }
    };
  }

  function commitMaskRectangle() {
    if (!pendingMaskRectangle || !rectHasArea(pendingMaskRectangle)) {
      return;
    }

    addAreaOp({ kind: 'erase', shapeType: 'rectangle', data: normalizeRect(pendingMaskRectangle) });
    pendingMaskRectangle = null;
    draw();
  }

  function startMaskPoly(r, c) {
    pendingMaskPoly = { pts: [{ r, c }] };
    previewPolySnap = null;
  }

  function addMaskPolyPoint(r, c) {
    if (!pendingMaskPoly) {
      return;
    }

    pendingMaskPoly.pts.push({ r, c });
  }

  function finishMaskPoly() {
    if (pendingMaskPoly && pendingMaskPoly.pts.length >= 3) {
      addAreaOp({ kind: 'erase', shapeType: 'points', data: pendingMaskPoly.pts.slice() });
    }

    pendingMaskPoly = null;
    previewPolySnap = null;
    draw();
  }

  function cancelMaskPoly() {
    pendingMaskPoly = null;
    previewPolySnap = null;
  }

  function cancelCurrentDraft() {
    pendingCircle = null;
    pendingRectangle = null;
    pendingMaskCircle = null;
    pendingMaskRectangle = null;
    cancelAreaPoly();
    cancelMaskPoly();
    pendingMeasure = null;
  }

  function removeMeasurementAt(x, y) {
    let bestIndex = -1;
    let bestDistance = Infinity;
    const threshold = Math.max(12, CELL * 0.45);

    for (let i = 0; i < measurements.length; i++) {
      const start = toXY(measurements[i].a.r, measurements[i].a.c);
      const end = toXY(measurements[i].b.r, measurements[i].b.c);
      const distance = distanceToSegment(x, y, start.x, start.y, end.x, end.y);
      if (distance < bestDistance) {
        bestDistance = distance;
        bestIndex = i;
      }
    }

    if (bestIndex >= 0 && bestDistance <= threshold) {
      measurements.splice(bestIndex, 1);
      return true;
    }

    return false;
  }

  function canFinishCurrentShape() {
    if (currentTool !== 'erase' && currentTool !== 'objective' && currentTool !== 'measure' && currentMode === 'points') {
      return Boolean(pendingAreaPoly && pendingAreaPoly.tool === currentTool && pendingAreaPoly.pts.length >= 3);
    }

    if (currentTool === 'erase' && currentMode === 'points') {
      return Boolean(pendingMaskPoly && pendingMaskPoly.pts.length >= 3);
    }

    if (currentTool === 'erase' && currentMode === 'circle') {
      return Boolean(pendingMaskCircle && pendingMaskCircle.radiusPx > 0);
    }

    if (currentTool === 'erase' && currentMode === 'rectangle') {
      return rectHasArea(pendingMaskRectangle);
    }

    if (currentTool !== 'erase' && currentTool !== 'objective' && currentTool !== 'measure' && currentMode === 'circle') {
      return Boolean(pendingCircle && pendingCircle.radiusPx > 0);
    }

    if (currentTool !== 'erase' && currentTool !== 'objective' && currentTool !== 'measure' && currentMode === 'rectangle') {
      return rectHasArea(pendingRectangle);
    }

    return false;
  }

  function finishCurrentShape() {
    if (currentTool !== 'erase' && currentTool !== 'objective' && currentTool !== 'measure' && currentMode === 'points') {
      finishAreaPoly();
      return;
    }

    if (currentTool === 'erase' && currentMode === 'points') {
      finishMaskPoly();
      return;
    }

    if (currentTool === 'erase' && currentMode === 'circle') {
      commitMaskCircle();
      return;
    }

    if (currentTool === 'erase' && currentMode === 'rectangle') {
      commitMaskRectangle();
      return;
    }

    if (currentTool !== 'erase' && currentTool !== 'objective' && currentTool !== 'measure' && currentMode === 'circle') {
      commitCircle();
      return;
    }

    if (currentTool !== 'erase' && currentTool !== 'objective' && currentTool !== 'measure' && currentMode === 'rectangle') {
      commitRectangle();
    }
  }

  function getShapeLabel() {
    if (currentMode === 'circle') return 'circle';
    if (currentMode === 'rectangle') return 'rectangle';
    return 'polygon';
  }

  function getDraftStatusText() {
    if (currentTool === 'measure') {
      if (measureMode === 'erase') {
        return 'Draft: Click a measurement line to remove it';
      }
      return pendingMeasure
        ? 'Draft: Pick the end point for the measurement'
        : 'Draft: Click a start point to measure';
    }

    if (currentTool === 'objective') {
      return 'Draft: Click any intersection to toggle an objective';
    }

    if (currentTool === 'erase') {
      if (currentMode === 'circle') {
        return pendingMaskCircle
          ? 'Draft: Move the mouse, then click again to finish the erase circle'
          : 'Draft: Click once to place the erase circle center';
      }

      if (currentMode === 'rectangle') {
        return pendingMaskRectangle
          ? 'Draft: Move the mouse, then click again to finish the erase rectangle'
          : 'Draft: Click once to place the first erase rectangle corner';
      }

      if (pendingMaskPoly) {
        return `Draft: ${pendingMaskPoly.pts.length} polygon point(s) placed. Click to add more, Enter to finish.`;
      }

      return 'Draft: Click to begin an erase polygon';
    }

    if (currentMode === 'circle') {
      return pendingCircle
        ? 'Draft: Move the mouse, then click again to finish the area circle'
        : 'Draft: Click once to place the area circle center';
    }

    if (currentMode === 'rectangle') {
      return pendingRectangle
        ? 'Draft: Move the mouse, then click again to finish the area rectangle'
        : 'Draft: Click once to place the first area rectangle corner';
    }

    if (pendingAreaPoly && pendingAreaPoly.tool === currentTool) {
      return `Draft: ${pendingAreaPoly.pts.length} polygon point(s) placed. Click to add more, then press Finish Shape.`;
    }

    return 'Draft: Click intersections to start a polygon area draft';
  }

  function syncDraftControls() {
    const hasDraft = Boolean(
      pendingCircle ||
      pendingRectangle ||
      pendingAreaPoly ||
      pendingMaskCircle ||
      pendingMaskRectangle ||
      pendingMaskPoly ||
      pendingMeasure
    );

    finishMaskBtn.disabled = !canFinishCurrentShape();
    cancelDraftBtn.disabled = !hasDraft;
    toggleMeasureEraseBtn.disabled = currentTool !== 'measure';
    toggleMeasureEraseBtn.setAttribute('aria-pressed', String(currentTool === 'measure' && measureMode === 'erase'));
    draftStatusEl.innerHTML = `<strong>Draft:</strong> ${getDraftStatusText().replace(/^Draft:\s*/, '')}`;
  }

  function drawMeasureLabel(cx, cy, text) {
    const padX = 12;
    const h = 32;

    ctx.save();
    ctx.font = 'bold 22px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif';

    const width = Math.ceil(ctx.measureText(text).width) + padX * 2;
    const x = cx - width / 2;
    const y = cy - h / 2;

    ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
    roundRect(ctx, x, y, width, h, 6);
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.fillText(text, x + padX, y + h - 9);
    ctx.restore();
  }

  function roundRect(targetCtx, x, y, w, h, r) {
    targetCtx.beginPath();
    targetCtx.moveTo(x + r, y);
    targetCtx.arcTo(x + w, y, x + w, y + h, r);
    targetCtx.arcTo(x + w, y + h, x, y + h, r);
    targetCtx.arcTo(x, y + h, x, y, r);
    targetCtx.arcTo(x, y, x + w, y, r);
    targetCtx.closePath();
  }

  function drawObjectives() {
    const radius = CELL;

    for (const objective of objectives.arr) {
      const { x, y } = toXY(objective.r, objective.c);
      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fillStyle = OBJECTIVE_COLOR;
      ctx.fill();
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = 'rgba(0, 0, 0, 0.45)';
      ctx.stroke();
      ctx.fillStyle = '#f3f4f6';
      ctx.font = `${Math.round(CELL)}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('💀', x, y + 1);
      ctx.restore();
    }
  }

  function drawMeasurements() {
    ctx.save();
    ctx.lineWidth = 2;
    ctx.strokeStyle = MEASURE_COLOR;

    for (const measurement of measurements) {
      const start = toXY(measurement.a.r, measurement.a.c);
      const end = toXY(measurement.b.r, measurement.b.c);

      ctx.beginPath();
      ctx.moveTo(start.x, start.y);
      ctx.lineTo(end.x, end.y);
      ctx.stroke();

      ctx.fillStyle = MEASURE_COLOR;
      ctx.beginPath();
      ctx.arc(start.x, start.y, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(end.x, end.y, 3, 0, Math.PI * 2);
      ctx.fill();

      drawMeasureLabel(
        (start.x + end.x) / 2,
        (start.y + end.y) / 2,
        `${Math.round(distInches(measurement.a, measurement.b))} "`
      );
    }

    if (currentTool === 'measure' && pendingMeasure && hoverSnap) {
      const start = toXY(pendingMeasure.r, pendingMeasure.c);
      const end = toXY(hoverSnap.r, hoverSnap.c);

      ctx.setLineDash([6, 6]);
      ctx.beginPath();
      ctx.moveTo(start.x, start.y);
      ctx.lineTo(end.x, end.y);
      ctx.stroke();

      ctx.fillStyle = MEASURE_COLOR;
      ctx.beginPath();
      ctx.arc(start.x, start.y, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(end.x, end.y, 3, 0, Math.PI * 2);
      ctx.fill();

      drawMeasureLabel(
        (start.x + end.x) / 2,
        (start.y + end.y) / 2,
        `${Math.round(distInches(pendingMeasure, hoverSnap))} "`
      );
    }

    ctx.restore();
  }

  function drawCirclePreview(circle, color, dashed = false) {
    if (!circle || circle.radiusPx <= 0) {
      return;
    }

    ctx.save();
    if (dashed) {
      ctx.setLineDash([6, 6]);
    }
    ctx.beginPath();
    ctx.arc(circle.centerXY.x, circle.centerXY.y, circle.radiusPx, 0, Math.PI * 2);
    ctx.fillStyle = color.fill;
    ctx.strokeStyle = color.stroke;
    ctx.lineWidth = 2;
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }

  function drawPolygonPreview(points, previewPoint, color, dashed = false) {
    if (!points || !points.length) {
      return;
    }

    const previewPoints = points.slice();
    if (previewPoint) {
      previewPoints.push(previewPoint);
    }

    if (previewPoints.length < 2) {
      return;
    }

    ctx.save();
    if (dashed) {
      ctx.setLineDash([6, 6]);
    }

    if (previewPoints.length >= 3) {
      drawPath(ctx, previewPoints);
      ctx.fillStyle = color.fill;
      ctx.fill();
    } else {
      drawPath(ctx, previewPoints, false);
    }

    ctx.strokeStyle = color.stroke;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }

  function drawRectanglePreview(rect, color, dashed = false) {
    if (!rect || !rectHasArea(rect)) {
      return;
    }

    ctx.save();
    if (dashed) {
      ctx.setLineDash([6, 6]);
    }
    drawRectPath(ctx, rect);
    ctx.fillStyle = color.fill;
    ctx.strokeStyle = color.stroke;
    ctx.lineWidth = 2;
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }

  function drawStatus() {
    const board = getBoardConfig();
    const greenPolygons = countAreaOps('add', 'green', 'points');
    const redPolygons = countAreaOps('add', 'red', 'points');
    const greenCircles = countAreaOps('add', 'green', 'circle');
    const redCircles = countAreaOps('add', 'red', 'circle');
    const greenRectangles = countAreaOps('add', 'green', 'rectangle');
    const redRectangles = countAreaOps('add', 'red', 'rectangle');
    const eraseCount =
      countAreaOps('erase', null, 'points') +
      countAreaOps('erase', null, 'circle') +
      countAreaOps('erase', null, 'rectangle');

    statusEl.textContent =
      `Board: ${board.label} | Tool: ${currentTool} | Mode: ${currentMode} | ` +
      `G poly:${greenPolygons} G circ:${greenCircles} G rect:${greenRectangles} | ` +
      `R poly:${redPolygons} R circ:${redCircles} R rect:${redRectangles} | ` +
      `Erase ops: ${eraseCount} | ` +
      `Objectives: ${objectives.arr.length} | Measures: ${measurements.length}`;

    syncDraftControls();
  }

  function updateHelp() {
    if (currentTool === 'objective') {
      helpEl.textContent = 'Objective: Click intersections to toggle an objective marker.';
      return;
    }

    if (currentTool === 'measure') {
      helpEl.textContent = measureMode === 'erase'
        ? 'Erase Measure: click a measurement line to remove it.'
        : 'Measure: Click a start point, then an end point. Distance shows in inches (1 grid = 1").';
      return;
    }

    if (currentTool === 'erase') {
      helpEl.textContent = currentMode === 'circle'
        ? 'Erase Area + Circle: click once for the center, move to size it, then click again to delete overlapping shapes.'
        : currentMode === 'rectangle'
          ? 'Erase Area + Rectangle: click once for the first corner, move to size it, then click again to delete overlapping shapes.'
          : 'Erase Area + Polygon: click to place corners. Press Enter or Finish Shape to delete overlapping shapes.';
      return;
    }

    if (currentMode === 'circle') {
      helpEl.textContent = 'Area + Circle: click once for the center, move to size it, then click again to place the area.';
      return;
    }

    if (currentMode === 'rectangle') {
      helpEl.textContent = 'Area + Rectangle: click once for the first corner, move to size it, then click again to place the area.';
      return;
    }

    helpEl.textContent = 'Area + Polygon: click intersections to build the outline, then press Finish Shape to commit it or Cancel Draft to discard it.';
  }

  function draw() {
    const rows = getRows();
    const cols = getCols();
    const logicalWidth = getLogicalWidth();
    const logicalHeight = getLogicalHeight();

    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.restore();

    ctx.save();
    ctx.fillStyle = css('--canvas-bg', '#161a2e');
    ctx.fillRect(0, 0, logicalWidth, logicalHeight);
    ctx.restore();

    clearLogicalContext(offCtx, off);
    replayAreaOpsToMask(greenMaskCtx, 'green');
    replayAreaOpsToMask(redMaskCtx, 'red');
    compositeMaskToLayer(greenMask, 'green');
    compositeMaskToLayer(redMask, 'red');

    ctx.drawImage(off, 0, 0, logicalWidth, logicalHeight);

    ctx.save();
    ctx.lineWidth = 1;

    for (let r = 0; r <= rows; r++) {
      const y = MARGIN + r * CELL + 0.5;
      ctx.beginPath();
      ctx.strokeStyle = r % 5 === 0 ? GRID_BOLD : GRID_COLOR;
      ctx.moveTo(MARGIN, y);
      ctx.lineTo(MARGIN + cols * CELL, y);
      ctx.stroke();
    }

    for (let c = 0; c <= cols; c++) {
      const x = MARGIN + c * CELL + 0.5;
      ctx.beginPath();
      ctx.strokeStyle = c % 5 === 0 ? GRID_BOLD : GRID_COLOR;
      ctx.moveTo(x, MARGIN);
      ctx.lineTo(x, MARGIN + rows * CELL);
      ctx.stroke();
    }

    ctx.restore();

    if (currentTool !== 'erase' && currentTool !== 'objective' && currentTool !== 'measure') {
      if (currentMode === 'circle' && pendingCircle) {
        drawCirclePreview(pendingCircle, COLORS[currentTool]);
      }

      if (currentMode === 'rectangle' && pendingRectangle) {
        drawRectanglePreview(pendingRectangle, COLORS[currentTool]);
      }

      if (currentMode === 'points' && hoverSnap) {
        const draftShape = pendingAreaPoly && pendingAreaPoly.tool === currentTool
          ? pendingAreaPoly.pts
          : [];
        if (draftShape.length > 0) {
          const lastPoint = draftShape[draftShape.length - 1];
          const isSameAsLast = lastPoint.r === hoverSnap.r && lastPoint.c === hoverSnap.c;
          drawPolygonPreview(
            draftShape,
            isSameAsLast ? null : hoverSnap,
            COLORS[currentTool]
          );
        }
      }
    }

    drawMeasurements();
    drawObjectives();

    if (pendingMaskCircle && pendingMaskCircle.radiusPx > 0) {
      drawCirclePreview(pendingMaskCircle, { fill: 'rgba(29, 25, 22, 0.14)', stroke: MEASURE_COLOR }, true);
    }

    if (pendingMaskRectangle) {
      drawRectanglePreview(
        pendingMaskRectangle,
        { fill: 'rgba(29, 25, 22, 0.14)', stroke: MEASURE_COLOR },
        true
      );
    }

    if (pendingMaskPoly) {
      drawPolygonPreview(
        pendingMaskPoly.pts,
        previewPolySnap,
        { fill: 'rgba(29, 25, 22, 0.14)', stroke: MEASURE_COLOR },
        true
      );
    }

    drawStatus();
  }

  function setTool(tool) {
    currentTool = tool;
    pendingCircle = null;
    pendingRectangle = null;

    if (tool !== 'erase') {
      resetMaskDraft();
    }

    if (tool !== 'measure') {
      pendingMeasure = null;
      measureMode = 'add';
    }

    setPressedState(toolButtons, tool);
    updateHelp();
    draw();
  }

  function setMode(mode) {
    currentMode = mode;

    if (mode !== 'circle') {
      pendingCircle = null;
      pendingMaskCircle = null;
    }

    if (mode !== 'rectangle') {
      pendingRectangle = null;
      pendingMaskRectangle = null;
    }

    setPressedState(modeButtons, mode);
    updateHelp();
    draw();
  }

  function setBoardPreset(boardPreset) {
    currentBoardPreset = boardPreset;
    setPressedState(boardButtons, boardPreset);
    boardSizeNoteEl.textContent = `Board uses a 1" grid and is currently set to ${getBoardConfig().label}.`;
    resizeCanvas();
    draw();
  }

  canvas.addEventListener('click', event => {
    const { x, y } = logicalFromClient(event.clientX, event.clientY);
    const { r, c } = snapToGrid(x, y);

    if (currentTool === 'erase') {
      if (currentMode === 'circle') {
        if (!pendingMaskCircle) {
          startMaskCircle(r, c);
        } else {
          commitMaskCircle();
        }
      } else if (currentMode === 'rectangle') {
        if (!pendingMaskRectangle) {
          startMaskRectangle(r, c);
        } else {
          updateRectangle(pendingMaskRectangle, r, c);
          commitMaskRectangle();
        }
      } else {
        if (!pendingMaskPoly) {
          startMaskPoly(r, c);
        } else {
          addMaskPolyPoint(r, c);
        }
      }

      draw();
      return;
    }

    if (currentTool === 'objective') {
      toggleObjective(r, c);
      draw();
      return;
    }

    if (currentTool === 'measure') {
      if (measureMode === 'erase') {
        removeMeasurementAt(x, y);
        draw();
        return;
      }

      if (!pendingMeasure) {
        pendingMeasure = { r, c };
      } else {
        addMeasurement(pendingMeasure, { r, c });
        pendingMeasure = null;
      }

      draw();
      return;
    }

    if (currentMode === 'points') {
      if (!pendingAreaPoly || pendingAreaPoly.tool !== currentTool) {
        startAreaPoly(currentTool, r, c);
      } else {
        addAreaPolyPoint(r, c);
      }
      draw();
      return;
    }

    if (currentMode === 'rectangle') {
      if (!pendingRectangle) {
        startRectangle(currentTool, r, c);
      } else {
        updateRectangle(pendingRectangle, r, c);
        commitRectangle();
      }
      return;
    }

    if (!pendingCircle) {
      startCircle(currentTool, r, c);
    } else {
      commitCircle();
    }
  });

  canvas.addEventListener('mousemove', event => {
    const { x, y } = logicalFromClient(event.clientX, event.clientY);
    hoverSnap = snapToGrid(x, y);

    if (currentTool === 'erase') {
      if (currentMode === 'circle' && pendingMaskCircle) {
        updateCircleRadius(pendingMaskCircle, event.clientX, event.clientY);
        draw();
      }

      if (currentMode === 'rectangle' && pendingMaskRectangle) {
        updateRectangle(pendingMaskRectangle, hoverSnap.r, hoverSnap.c);
        draw();
      }

      if (currentMode === 'points' && pendingMaskPoly) {
        previewPolySnap = hoverSnap;
        draw();
      }

      return;
    }

    if (currentTool === 'measure' && pendingMeasure) {
      draw();
      return;
    }

    if (currentMode === 'circle' && pendingCircle) {
      updateCircleRadius(pendingCircle, event.clientX, event.clientY);
      draw();
      return;
    }

    if (currentMode === 'rectangle' && pendingRectangle) {
      updateRectangle(pendingRectangle, hoverSnap.r, hoverSnap.c);
      draw();
      return;
    }

    if (currentTool !== 'erase' && currentTool !== 'objective' && currentTool !== 'measure' && currentMode === 'points' && pendingAreaPoly && pendingAreaPoly.tool === currentTool) {
      previewPolySnap = hoverSnap;
      draw();
      return;
    }

    if (currentTool !== 'objective' && currentTool !== 'measure' && currentMode === 'points') {
      draw();
    }
  });

  window.addEventListener('keydown', event => {
    if (event.key === 'Escape') {
      cancelCurrentDraft();
      draw();
    }

    if (event.key === 'Enter' && canFinishCurrentShape()) {
      finishCurrentShape();
    }
  });

  window.addEventListener('resize', () => {
    resizeCanvas();
    draw();
  });

  for (const tool of TOOL_IDS) {
    toolButtons[tool].addEventListener('click', () => setTool(tool));
  }

  for (const mode of MODE_IDS) {
    modeButtons[mode].addEventListener('click', () => setMode(mode));
  }

  for (const boardPreset of BOARD_IDS) {
    boardButtons[boardPreset].addEventListener('click', () => setBoardPreset(boardPreset));
  }

  finishMaskBtn.addEventListener('click', () => {
    if (canFinishCurrentShape()) {
      finishCurrentShape();
    }
  });
  importMapBtn.addEventListener('click', () => {
    importMapInput.click();
  });
  exportMapBtn.addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(getSerializedMap(), null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `${sanitizeFilename(getMapName())}.json`;
    link.click();
    URL.revokeObjectURL(url);
  });
  saveImageBtn.addEventListener('click', () => {
    draw();
    const link = document.createElement('a');
    link.href = canvas.toDataURL('image/png');
    link.download = `${sanitizeFilename(getMapName())}.png`;
    link.click();
  });
  importMapInput.addEventListener('change', async event => {
    const file = event.target.files && event.target.files[0];
    if (!file) {
      return;
    }

    try {
      const text = await file.text();
      loadMapData(JSON.parse(text));
    } catch (error) {
      console.error('Failed to import map:', error);
      window.alert('Could not import that map file. Please choose a valid JSON export from this tool.');
    } finally {
      importMapInput.value = '';
    }
  });
  toggleMeasureEraseBtn.addEventListener('click', () => {
    if (currentTool !== 'measure') {
      return;
    }

    measureMode = measureMode === 'add' ? 'erase' : 'add';
    pendingMeasure = null;
    updateHelp();
    draw();
  });
  cancelDraftBtn.addEventListener('click', () => {
    cancelCurrentDraft();
    draw();
  });

  undoBtn.addEventListener('click', () => {
    if (currentTool === 'objective') {
      const last = objectives.arr.pop();
      if (last) {
        objectives.set.delete(key(last.r, last.c));
      }
      draw();
      return;
    }

    if (currentTool === 'measure') {
      measurements.pop();
      draw();
      return;
    }

    if (currentTool === 'erase') {
      if (currentMode === 'points' && pendingMaskPoly) {
        pendingMaskPoly.pts.pop();
        if (pendingMaskPoly.pts.length === 0) {
          cancelMaskPoly();
        }
        draw();
        return;
      }

      if (currentMode === 'circle') {
        if (pendingMaskCircle) {
          pendingMaskCircle = null;
          draw();
          return;
        }
      } else if (currentMode === 'rectangle') {
        if (pendingMaskRectangle) {
          pendingMaskRectangle = null;
          draw();
          return;
        }
      }

      undoAreaOp(op => op.kind === 'erase' && op.shapeType === getShapeTypeForMode(currentMode));
      draw();
      return;
    }

    if (currentMode === 'circle') {
      if (pendingCircle) {
        pendingCircle = null;
        draw();
        return;
      }

      undoAreaOp(op => op.kind === 'add' && op.color === currentTool && op.shapeType === 'circle');
    } else if (currentMode === 'rectangle') {
      if (pendingRectangle) {
        pendingRectangle = null;
        draw();
        return;
      }

      undoAreaOp(op => op.kind === 'add' && op.color === currentTool && op.shapeType === 'rectangle');
    } else {
      if (pendingAreaPoly && pendingAreaPoly.tool === currentTool) {
        pendingAreaPoly.pts.pop();
        if (pendingAreaPoly.pts.length === 0) {
          cancelAreaPoly();
        }
        draw();
        return;
      }

      undoAreaOp(op => op.kind === 'add' && op.color === currentTool && op.shapeType === 'points');
    }

    draw();
  });

  clearBtn.addEventListener('click', () => {
    if (currentTool === 'objective') {
      objectives.arr.length = 0;
      objectives.set.clear();
    } else if (currentTool === 'measure') {
      measurements.length = 0;
      pendingMeasure = null;
    } else if (currentTool === 'erase') {
      clearAreaOps(op => op.kind === 'erase');
    } else if (currentMode === 'circle') {
      clearAreaOps(op => op.kind === 'add' && op.color === currentTool && op.shapeType === 'circle');
    } else if (currentMode === 'rectangle') {
      clearAreaOps(op => op.kind === 'add' && op.color === currentTool && op.shapeType === 'rectangle');
    } else {
      clearAreaOps(op => op.kind === 'add' && op.color === currentTool && op.shapeType === 'points');
    }

    resetPendingState();
    draw();
  });

  resizeCanvas();
  updateHelp();
  draw();

  window.exportAll = () => getSerializedMap();
  window.importAll = data => loadMapData(data);
</script>
</body>
</html>
