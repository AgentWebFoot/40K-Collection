<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    </head>

    <body>
        <script>
            class Location {
                constructor(name, description = {}) {
                    this.name = name;
                    this.description = description;
                }

                getName() {
                    return this.name;
                }
                getDescription() {
                    return this.description;
                }
            }
            class Condition {
                constructor(name, description = {}) {
                    this.name = name;
                    this.description = description;
                }

                getName() {
                    return this.name;
                }
                getDescription() {
                    return this.description;
                }
            }
        </script>
    </body>
</html>
